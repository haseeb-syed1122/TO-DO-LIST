
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Anti-Gravity To-Do</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:
        radial-gradient(circle at top left,#1f1147,#090b1a 45%),
        linear-gradient(135deg,#0f172a,#020617);
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* Animated glowing background */
body::before,
body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(120px);
    opacity:.35;
    animation:float 10s ease-in-out infinite;
}

body::before{
    background:#00f0ff;
    top:-150px;
    left:-100px;
}

body::after{
    background:#ff00ea;
    bottom:-150px;
    right:-100px;
    animation-delay:4s;
}

@keyframes float{
    0%,100%{
        transform:translateY(0px) translateX(0px);
    }
    50%{
        transform:translateY(30px) translateX(20px);
    }
}

/* Floating particles */
.particles{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.particles span{
    position:absolute;
    display:block;
    width:6px;
    height:6px;
    background:rgba(255,255,255,0.7);
    border-radius:50%;
    animation:rise linear infinite;
}

@keyframes rise{
    from{
        transform:translateY(100vh) scale(0);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
    }
}

/* Main card */
.app{
    position:relative;
    z-index:1;
    width:420px;
    padding:30px;
    border-radius:30px;
    backdrop-filter:blur(25px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:
        0 0 25px rgba(0,255,255,0.2),
        0 0 60px rgba(255,0,255,0.15);
    animation:levitate 5s ease-in-out infinite;
}

@keyframes levitate{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
}

h1{
    text-align:center;
    margin-bottom:25px;
    font-size:2rem;
    background:linear-gradient(90deg,#00f0ff,#ff00ea);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    letter-spacing:2px;
}

.input-area{
    display:flex;
    gap:12px;
    margin-bottom:25px;
}

.input-area input{
    flex:1;
    padding:14px 16px;
    border:none;
    border-radius:15px;
    background:rgba(255,255,255,0.12);
    color:white;
    font-size:1rem;
    outline:none;
    transition:0.3s;
}

.input-area input:focus{
    background:rgba(255,255,255,0.18);
    box-shadow:0 0 12px #00f0ff;
}

.input-area input::placeholder{
    color:#cbd5e1;
}

.input-area button{
    border:none;
    padding:14px 20px;
    border-radius:15px;
    cursor:pointer;
    background:linear-gradient(135deg,#00f0ff,#7c3aed,#ff00ea);
    color:white;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 0 15px rgba(0,255,255,0.4);
}

.input-area button:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px rgba(255,0,255,0.6);
}

/* Tasks */
.todo-list{
    list-style:none;
    max-height:400px;
    overflow-y:auto;
    padding-right:5px;
}

.todo-list::-webkit-scrollbar{
    width:6px;
}

.todo-list::-webkit-scrollbar-thumb{
    background:#7c3aed;
    border-radius:20px;
}

.todo{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:16px;
    margin-bottom:14px;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    animation:pop .4s ease;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

.todo::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(90deg,
    transparent,
    rgba(255,255,255,0.08),
    transparent);
    transform:translateX(-100%);
}

.todo:hover::before{
    animation:shine 1.2s linear;
}

@keyframes shine{
    to{
        transform:translateX(100%);
    }
}

.todo:hover{
    transform:translateY(-4px) scale(1.02);
    box-shadow:0 0 20px rgba(0,255,255,0.2);
}

@keyframes pop{
    from{
        opacity:0;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.todo.completed .text{
    text-decoration:line-through;
    opacity:0.5;
}

.text{
    flex:1;
    cursor:pointer;
    word-break:break-word;
}

.actions{
    display:flex;
    gap:10px;
    margin-left:12px;
}

.actions button{
    width:36px;
    height:36px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    color:white;
    font-size:1rem;
    transition:0.3s;
}

.complete-btn{
    background:linear-gradient(135deg,#00ffa3,#00c2ff);
}

.delete-btn{
    background:linear-gradient(135deg,#ff4d6d,#ff00ea);
}

.actions button:hover{
    transform:scale(1.12) rotate(5deg);
}

/* Responsive */
@media(max-width:500px){
    .app{
        width:92%;
        padding:22px;
    }

    h1{
        font-size:1.6rem;
    }
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="app">
    <h1>ANTI-GRAVITY TASKS</h1>

    <div class="input-area">
        <input type="text" id="taskInput" placeholder="Enter futuristic mission..." />
        <button onclick="addTask()">ADD</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>
</div>

<script>
// Floating particles
const particles = document.getElementById("particles");

for(let i=0;i<45;i++){
    const particle = document.createElement("span");

    particle.style.left = Math.random() * 100 + "vw";
    particle.style.animationDuration = (Math.random() * 10 + 6) + "s";
    particle.style.animationDelay = Math.random() * 5 + "s";
    particle.style.opacity = Math.random();

    const size = Math.random() * 5 + 2;
    particle.style.width = size + "px";
    particle.style.height = size + "px";

    particles.appendChild(particle);
}

// To-Do Logic
const taskInput = document.getElementById("taskInput");
const todoList = document.getElementById("todoList");

function addTask(){
    const text = taskInput.value.trim();

    if(text === "") return;

    const li = document.createElement("li");
    li.className = "todo";

    li.innerHTML = `
        <span class="text">${text}</span>

        <div class="actions">
            <button class="complete-btn">✓</button>
            <button class="delete-btn">✕</button>
        </div>
    `;

    // Complete Task
    li.querySelector(".complete-btn").addEventListener("click", () => {
        li.classList.toggle("completed");
    });

    // Delete Task
    li.querySelector(".delete-btn").addEventListener("click", () => {
        li.style.transform = "scale(0)";
        li.style.opacity = "0";

        setTimeout(() => {
            li.remove();
        }, 300);
    });

    todoList.prepend(li);

    taskInput.value = "";
}

// Enter Key
taskInput.addEventListener("keypress", (e)=>{
    if(e.key === "Enter"){
        addTask();
    }
});
</script>

</body>
</html>
